{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>
        <i class="bi bi-pencil-square me-2" style="color: #F28C33;"></i>
        Editar Treino {{ treino.codigo }}
    </h2>
    <a href="{{ url_for('aluno.treinos') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Voltar
    </a>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="mb-3">
                <label class="form-label fw-bold">ID do Treino</label>
                <input type="text" name="id" class="form-control" 
                       value="{{ treino.codigo }}" maxlength="1" required>
                <small class="text-muted">Uma única letra maiúscula</small>
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-bold">Nome do Treino</label>
                <input type="text" name="nome" class="form-control" 
                       value="{{ treino.nome }}" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-bold">Descrição</label>
                <input type="text" name="descricao" class="form-control" 
                       value="{{ treino.descricao }}">
            </div>
            
            <div class="mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> Salvar Alterações
                </button>
                <a href="{{ url_for('aluno.treinos') }}" class="btn btn-secondary">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
