<!-- Modal Editar Treino -->
<div class="modal fade" id="modalEditarTreino" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header" style="background: linear-gradient(135deg, #FFB366 0%, #F28C33 100%); color: white;">
                <h5 class="modal-title">
                    <i class="bi bi-pencil-square"></i> Editar Treino
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form action="{{ url_for('admin.editar_treino') }}" method="post" id="formEditarTreino">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <div class="modal-body">
                    <input type="hidden" name="id_original" id="edit_treino_id_original">
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">ID do Treino</label>
                        <input type="text" name="id" id="edit_treino_id" class="form-control" 
                               maxlength="1" pattern="[A-Za-z]" required>
                        <div class="form-text">Uma única letra (será convertida para maiúscula)</div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nome do Treino</label>
                        <input type="text" name="nome" id="edit_treino_nome" class="form-control" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Descrição</label>
                        <input type="text" name="descricao" id="edit_treino_descricao" class="form-control" required>
                    </div>
                    
                    <div class="alert alert-warning" id="edit_treino_alerta" style="display: none;">
                        <i class="bi bi-exclamation-triangle"></i> 
                        <span id="edit_treino_mensagem"></span>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn" style="background: linear-gradient(135deg, #FFB366 0%, #F28C33 100%); color: white; border: none;">
                        <i class="bi bi-save"></i> Salvar Alterações
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Validação de ID único
    const editTreinoId = document.getElementById('edit_treino_id');
    if (editTreinoId) {
        editTreinoId.addEventListener('input', function() {
            const novoId = this.value.toUpperCase();
            const idOriginal = document.getElementById('edit_treino_id_original').value;
            const alertaDiv = document.getElementById('edit_treino_alerta');
            const mensagemSpan = document.getElementById('edit_treino_mensagem');
            
            this.value = novoId;
            
            if (novoId === idOriginal || !novoId || novoId.length === 0) {
                alertaDiv.style.display = 'none';
                return;
            }
            
            fetch(`/api/verificar-treino?id=${encodeURIComponent(novoId)}`)
                .then(response => response.json())
                .then(data => {
                    if (data.existe) {
                        mensagemSpan.textContent = `O ID "${novoId}" já está em uso por outro treino.`;
                        alertaDiv.style.display = 'block';
                    } else {
                        alertaDiv.style.display = 'none';
                    }
                })
                .catch(error => {
                    console.error('Erro ao verificar treino:', error);
                    mensagemSpan.textContent = 'Não foi possível verificar a disponibilidade do ID.';
                    alertaDiv.style.display = 'block';
                    alertaDiv.className = 'alert alert-warning';
                });
        });
    }
    
    // Bloquear submit se houver conflito
    const form = document.getElementById('formEditarTreino');
    if (form) {
        form.addEventListener('submit', function(e) {
            const alertaDiv = document.getElementById('edit_treino_alerta');
            if (alertaDiv.style.display === 'block') {
                e.preventDefault();
                alert('O ID informado já está em uso. Escolha outro.');
                return false;
            }
        });
    }
});
</script>
