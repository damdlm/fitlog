{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-header bg-white text-center py-3">
                <h4 class="mb-0" style="color: #F28C33;">
                    <i class="bi bi-key"></i> Recuperar senha
                </h4>
            </div>
            <div class="card-body p-4">
                <p class="text-muted">
                    Informe o e-mail cadastrado na sua conta. Se ele existir,
                    enviaremos um link para você redefinir sua senha.
                </p>
                <form method="post">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

                    <div class="mb-3">
                        <label class="form-label fw-bold">E-mail</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" name="email" id="emailInput" class="form-control"
                                   placeholder="Digite seu e-mail" required autofocus>
                        </div>
                        <div id="emailFeedback" class="alert alert-danger d-flex align-items-center gap-2 mt-2 mb-0 py-2 px-3 d-none"
                             style="font-size: 0.9rem; border-radius: 10px; animation: fitlogFadeIn 0.2s ease-out;">
                            <i class="bi bi-exclamation-circle-fill"></i>
                            <span>Não encontramos nenhuma conta com esse e-mail.</span>
                        </div>
                    </div>

                    <button type="submit" class="btn w-100 py-2" style="background: linear-gradient(135deg, #F28C33 0%, #FFB366 100%); color: white; border: none;">
                        <i class="bi bi-send"></i> Enviar link de redefinição
                    </button>
                </form>

                <hr class="my-4">

                <div class="text-center">
                    <a href="{{ url_for('auth.login') }}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Voltar para o login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
@keyframes fitlogFadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
}
@keyframes fitlogShake {
    10%, 90% { transform: translateX(-1px); }
    20%, 80% { transform: translateX(2px); }
    30%, 50%, 70% { transform: translateX(-4px); }
    40%, 60% { transform: translateX(4px); }
}
.fitlog-shake { animation: fitlogShake 0.4s; }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const emailInput = document.getElementById('emailInput');
    const feedback = document.getElementById('emailFeedback');
    const form = emailInput.closest('form');
    const submitBtn = form.querySelector('button[type="submit"]');
    const submitBtnHtmlOriginal = submitBtn.innerHTML;

    function mostrarFeedback() {
        feedback.classList.remove('d-none');
        emailInput.classList.add('is-invalid');
    }

    function esconderFeedback() {
        feedback.classList.add('d-none');
        emailInput.classList.remove('is-invalid');
    }

    async function emailExiste(email) {
        const resp = await fetch('/auth/check-email?email=' + encodeURIComponent(email));
        const dados = await resp.json();
        return dados.exists;
    }

    // Checagem "de passagem" ao sair do campo -- dá feedback rápido,
    // mas NÃO é a validação que decide se o formulário pode ser
    // enviado (ver submit abaixo), pra evitar corrida entre o blur
    // ainda em andamento e um envio rápido (Enter ou clique rápido no
    // botão antes do blur terminar).
    emailInput.addEventListener('blur', async function() {
        const email = emailInput.value.trim();
        esconderFeedback();
        if (!email) return;
        try {
            if (!(await emailExiste(email))) mostrarFeedback();
        } catch (erro) {
            console.error('Erro ao verificar e-mail:', erro);
        }
    });

    emailInput.addEventListener('input', esconderFeedback);

    form.addEventListener('submit', async function(evento) {
        evento.preventDefault();
        const email = emailInput.value.trim();

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Verificando...';

        try {
            const existe = await emailExiste(email);
            if (!existe) {
                mostrarFeedback();
                emailInput.classList.add('fitlog-shake');
                setTimeout(() => emailInput.classList.remove('fitlog-shake'), 400);
                emailInput.focus();
                emailInput.select();
                return;
            }
            form.submit();
        } catch (erro) {
            // Falha ao checar (ex: sem internet): não trava o usuário --
            // deixa o backend, que sempre responde de forma genérica,
            // tratar o envio.
            console.error('Erro ao verificar e-mail:', erro);
            form.submit();
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = submitBtnHtmlOriginal;
        }
    });
});
</script>
{% endblock %}
