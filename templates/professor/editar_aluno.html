{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-white">
                <h4 class="mb-0" style="color: #F28C33;">
                    <i class="bi bi-pencil-square"></i> Editar Aluno
                </h4>
            </div>
            <div class="card-body">
                <form method="post">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nome Completo</label>
                        <input type="text" name="nome_completo" class="form-control" 
                               value="{{ aluno.nome_completo or '' }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Usuário</label>
                        <input type="text" class="form-control" value="{{ aluno.username }}" disabled readonly>
                        <small class="text-muted">O nome de usuário não pode ser alterado</small>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">E-mail</label>
                        <input type="email" name="email" class="form-control" value="{{ aluno.email }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Telefone</label>
                        <input type="text" name="telefone" class="form-control" value="{{ aluno.telefone or '' }}">
                    </div>
                    
                    <hr>
                    
                    <h5 class="mb-3">Alterar Senha (opcional)</h5>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nova Senha</label>
                        <input type="password" name="nova_senha" class="form-control" minlength="6">
                        <small class="text-muted">Deixe em branco para manter a senha atual</small>
                    </div>
                    
                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> Salvar Alterações
                        </button>
                        <a href="{{ url_for('professor.visualizar_aluno', aluno_id=aluno.id) }}" class="btn btn-secondary">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
