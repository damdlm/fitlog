{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-white">
                <h4 class="mb-0" style="color: #F28C33;">
                    <i class="bi bi-person-plus"></i> Cadastrar Novo Aluno
                </h4>
            </div>
            <div class="card-body">
                <form method="post">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nome Completo</label>
                        <input type="text" name="nome_completo" class="form-control" 
                               placeholder="Digite o nome completo" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Usuário</label>
                        <input type="text" name="username" class="form-control" 
                               placeholder="Escolha um nome de usuário" required minlength="3">
                        <small class="text-muted">Mínimo 3 caracteres</small>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">E-mail</label>
                        <input type="email" name="email" class="form-control" 
                               placeholder="Digite o e-mail" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Telefone</label>
                        <input type="text" name="telefone" class="form-control" 
                               placeholder="(11) 99999-9999">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Senha</label>
                        <input type="password" name="password" class="form-control" 
                               placeholder="Digite a senha" required minlength="6">
                        <small class="text-muted">Mínimo 6 caracteres</small>
                    </div>
                    
                    <div class="alert alert-info">
                        <i class="bi bi-info-circle me-2"></i>
                        O aluno será automaticamente vinculado a você e receberá treinos básicos.
                    </div>
                    
                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> Cadastrar Aluno
                        </button>
                        <a href="{{ url_for('professor.listar_alunos') }}" class="btn btn-secondary">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
