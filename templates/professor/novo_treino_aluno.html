{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>
        <i class="bi bi-plus-circle me-2" style="color: #F28C33;"></i>
        Novo Treino para {{ aluno.nome_completo or aluno.username }}
    </h2>
    <a href="{{ url_for('professor.treinos_aluno', aluno_id=aluno.id) }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Voltar
    </a>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="mb-3">
                <label class="form-label fw-bold">ID do Treino</label>
                <input type="text" name="id" class="form-control" 
                       placeholder="Ex: A, B, C..." maxlength="1" required>
                <small class="text-muted">Uma única letra maiúscula</small>
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-bold">Nome do Treino</label>
                <input type="text" name="nome" class="form-control" 
                       placeholder="Ex: Treino de Costas" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-bold">Descrição</label>
                <input type="text" name="descricao" class="form-control" 
                       placeholder="Ex: Foco em dorsais e espessura">
            </div>
            
            <div class="mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> Criar Treino
                </button>
                <a href="{{ url_for('professor.treinos_aluno', aluno_id=aluno.id) }}" class="btn btn-secondary">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
